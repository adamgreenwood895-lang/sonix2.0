<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SONIX 2.0</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="bg"></div>

<div class="app">

  <div class="hero">
    <div class="title">SONIX</div>
    <div id="sub">ready</div>
  </div>

  <div id="orb" class="orb"></div>

  <div id="status">Idle</div>

  <div id="output">Upload music to begin</div>

  <!-- ✅ IMPORTANT FIX: label wrapper (mobile-safe click trigger) -->
  <label class="uploadBtn">
    Upload Music
    <input type="file" id="upload" multiple accept="audio/*">
  </label>

  <button id="playBtn">Play Music</button>

  <audio id="audio"></audio>

</div>

<script src="script.js"></script>

</body>
</html>
